<!DOCTYPE html>
<html>
<head>
<title>Digicrafst Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {font-family:Arial;background:#020617;color:white;margin:0;text-align:center;}
.btn {background:#38bdf8;color:black;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block;margin:10px;}
.box {background:#1e293b;padding:20px;margin:15px;border-radius:10px;}
input, textarea {width:80%;padding:10px;margin:10px;border-radius:5px;border:none;}
</style>
</head>

<body>

<h1>Digicrafst</h1>
<p>Demo Prototype</p>

<!-- Login -->
<div class="box">
<h2>Login</h2>
<a class="btn">Login with Gmail</a>
</div>

<!-- Dashboard -->
<div class="box">
<h2>Dashboard</h2>
<p>Welcome User</p>
<a class="btn">Start Project</a>
</div>

<!-- Chat -->
<div class="box">
<h2>Chat</h2>
<p><b>Client:</b> I need logo</p>
<p><b>You:</b> Sure, price ₹999</p>
<input placeholder="Type message...">
</div>

<!-- Order -->
<div class="box">
<h2>Order Form</h2>
<input placeholder="Your Name"><br>
<input placeholder="Service"><br>
<textarea placeholder="Project Details"></textarea>
</div>

<!-- Payment -->
<div class="box">
<h2>Payment</h2>
<p>Offer: ₹999</p>
<a class="btn">Pay Now</a>
<p style="color:lightgreen;">Payment Successful (Demo)</p>
</div>

</body>
</html>
